name: Release

# Tag-driven, like rafters: bump the version in package.json, commit, then push a
# matching `vX.Y.Z` tag. This builds, publishes to npm with provenance, and cuts a
# GitHub Release with auto-generated notes.

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # npm provenance (OIDC)
  contents: write # create the GitHub Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm (>=11.5.1 for OIDC provenance)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify the tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Test (full suite including specs)
        run: pnpm test:all

      - name: Publish to npm
        run: npm publish --access=public --provenance

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
